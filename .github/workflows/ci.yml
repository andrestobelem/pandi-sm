name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: build-test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # El barrel raíz compilado debe importarse sin lanzar bajo Node >=20.
      - name: smoke import dist barrel
        run: node -e "import('./dist/index.js').then(m => { if (m.VERSION !== '0.0.0') { process.exit(1); } })"

      - run: npm run test:ci

      - name: upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-node-${{ matrix.node }}
          path: reports/junit.xml
          if-no-files-found: error
